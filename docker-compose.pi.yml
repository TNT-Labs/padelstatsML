# Raspberry Pi 5 (8 GB) overlay — use on top of docker-compose.yml:
#
#   docker-compose -f docker-compose.yml -f docker-compose.pi.yml up -d
#
# ── Storage backend ──────────────────────────────────────────────────────────
# Two options; uncomment the one you want:
#
# Option A — Local SSD (recommended for Pi 5)
#   Saves ~250 MB RAM (no MinIO). Videos are written to /mnt/ssd/padel-videos.
#   Mount the SSD before starting: sudo mount /dev/sda1 /mnt/ssd
#   Then start WITHOUT minio:
#     docker compose -f docker-compose.yml -f docker-compose.pi.yml \
#       up -d postgres redis api worker frontend
#
# Option B — MinIO (S3-compatible, same as non-Pi setup)
#   Include minio in the up command as normal.
#
# ── Memory budget (Option A — local SSD) ────────────────────────────────────
#   postgres  192 MB
#   redis     160 MB
#   api       256 MB
#   worker   3500 MB
#   frontend   64 MB
#   ──────────────────
#   Total    ~4.2 GB  (comfortable within 8 GB; ~250 MB saved vs MinIO)
#
# ── Memory budget (Option B — MinIO) ────────────────────────────────────────
#   + minio   256 MB  →  Total ~4.4 GB
#
# Flower is excluded on Pi to save ~128 MB.

services:
  postgres:
    command: >
      postgres
        -c max_connections=20
        -c shared_buffers=64MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c effective_cache_size=192MB
        -c wal_buffers=4MB
        -c checkpoint_completion_target=0.9
    deploy:
      resources:
        limits:
          memory: 192M

  redis:
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
    deploy:
      resources:
        limits:
          memory: 160M

#  minio:
#   deploy:
#      resources:
#        limits:
#          memory: 256M

  api:
    build:
      dockerfile: Dockerfile.pi
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      ML_DEVICE: cpu
      TORCH_NUM_THREADS: "4"
      # ── Local SSD storage (Option A) ─────────────────────
      # Uncomment these three lines and remove minio from the up command.
      # Replace the IP with your Pi's actual address.
      STORAGE_BACKEND: local
      VIDEOS_DIR: /data/videos
      API_BASE_URL: "http://192.168.1.75"
    volumes:
      # ── Local SSD volume (Option A) ──────────────────────
      # Uncomment when using STORAGE_BACKEND=local.
      # The SSD must be mounted at /mnt/ssd before starting Docker.
      - /mnt/usbssd/padel-videos:/data/videos
    
    deploy:
      resources:
        limits:
          memory: 256M

  worker:
    build:
      dockerfile: Dockerfile.pi
    environment:
      ML_DEVICE: cpu
      TORCH_NUM_THREADS: "4"
      # Higher stride = fewer frames to process, proportional speedup
      PLAYER_STRIDE: "3"
      # Use ONNX model if exported (python scripts/export_onnx.py)
      YOLO_WEIGHTS: weights/yolov8n.onnx
      # ── Local SSD storage (Option A) ─────────────────────
      STORAGE_BACKEND: local
      VIDEOS_DIR: /data/videos
    volumes:
      - ./weights:/app/weights:ro
      # ── Local SSD volume (Option A) ──────────────────────
      - /mnt/usbssd/padel-videos:/data/videos
    deploy:
      resources:
        limits:
          memory: 3500M

  # Disable flower on Pi (not essential, saves ~128 MB)
  flower:
    profiles:
      - debug

  frontend:
    deploy:
      resources:
        limits:
          memory: 64M
