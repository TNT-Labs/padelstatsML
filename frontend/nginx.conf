server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream IP is re-resolved on every request.
    # Without this, nginx caches the IP at startup and breaks when the api
    # container restarts (new IP → EHOSTUNREACH / 502).
    resolver 127.0.0.11 valid=5s;
    set $api http://api:8000;

    # Proxy API calls to FastAPI so the browser doesn't hit CORS
    location /matches {
        proxy_pass              $api;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_read_timeout      3600;
        proxy_send_timeout      3600;
        # Stream request body directly to backend without buffering —
        # critical for large video uploads (up to 2 GB) on local storage.
        proxy_request_buffering off;
        proxy_buffering         off;
        # Allow up to 2 GB body (applies when local storage upload goes through nginx)
        client_max_body_size    2G;
        client_body_timeout     3600;
    }

    location /health {
        proxy_pass $api;
    }

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for static assets (Vite hashes filenames)
    location ~* \.(js|css|woff2|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
