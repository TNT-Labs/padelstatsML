# Raspberry Pi 5 (8 GB) — file standalone, non richiede docker-compose.yml.
#
# Avvio rapido (storage MinIO):
#   cd backend/
#   docker compose -f docker-compose.pi.yml up -d postgres redis minio api worker frontend
#   docker compose -f docker-compose.pi.yml run --rm migrate
#
# Avvio con SSD locale (senza MinIO):
#   Decommenta le sezioni "SSD locale" qui sotto, poi:
#   docker compose -f docker-compose.pi.yml up -d postgres redis api worker frontend
#   docker compose -f docker-compose.pi.yml run --rm migrate
#
# ── Budget memoria ────────────────────────────────────────────────────────────
#   postgres  192 MB
#   redis     160 MB
#   minio     256 MB  (non serve con SSD locale)
#   api       256 MB
#   worker   3500 MB
#   frontend   64 MB
#   ──────────────────
#   Totale   ~4.4 GB (MinIO)  oppure  ~4.2 GB (SSD locale)

version: "3.9"

x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://padel:padel@postgres:5432/padel
  SYNC_DATABASE_URL: postgresql://padel:padel@postgres:5432/padel
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  ML_DEVICE: cpu
  TORCH_NUM_THREADS: "4"
  PLAYER_STRIDE: "3"
  YOLO_WEIGHTS: weights/yolov8n.onnx   # dopo: python scripts/export_onnx.py
  TRACKNET_WEIGHTS: weights/tracknet_padel.pth
  # TRACKNET_WEIGHTS_URL: ""            # URL per auto-download pesi (opzionale)
  MAX_VIDEO_SIZE_MB: "2048"
  # ── Storage MinIO (default) ───────────────────────────────────────
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: padel
  S3_SECRET_KEY: padelpadel
  S3_BUCKET_VIDEOS: padel-videos
  S3_REGION: us-east-1
  # ── Storage SSD locale (decommenta e commenta le 5 righe sopra) ───
  # STORAGE_BACKEND: local
  # VIDEOS_DIR: /data/videos
  # API_BASE_URL: "http://192.168.1.42"   # ← IP del Pi sulla rete locale

services:

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    command: >
      postgres
        -c max_connections=20
        -c shared_buffers=64MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c effective_cache_size=192MB
        -c wal_buffers=4MB
        -c checkpoint_completion_target=0.9
    environment:
      POSTGRES_DB: padel
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: padel
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 160M

  # ── MinIO (non serve con STORAGE_BACKEND=local) ───────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: padel
      MINIO_ROOT_PASSWORD: padelpadel
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: [miniodata:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Migrazione DB (one-shot) ──────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.pi
    command: alembic upgrade head
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy

  # ── FastAPI ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.pi
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports: ["8000:8000"]
    environment: *app-env
    volumes:
      # ── SSD locale (decommenta se STORAGE_BACKEND=local) ─────────
      # - /mnt/ssd/padel-videos:/data/videos
      []
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Celery worker ML ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.pi
    command: >
      celery -A app.workers.tasks.celery_app worker
        --loglevel=info -Q celery -c 1 --pool=solo
    environment: *app-env
    volumes:
      - ./weights:/app/weights:ro
      # ── SSD locale (decommenta se STORAGE_BACKEND=local) ─────────
      # - /mnt/ssd/padel-videos:/data/videos
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3500M

  # ── Frontend nginx ────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports: ["80:80"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata:
  miniodata:
