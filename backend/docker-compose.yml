version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: padel
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: padel
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: padel
      MINIO_ROOT_PASSWORD: padelpadel
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: [miniodata:/data]

volumes:
  pgdata:
  miniodata:
